# ===============================================================
# IMPORT EXTERNAL CONFIGURATION
# ===============================================================
# Load internal infrastructure defaults, then import and override with the environment-specific reveila.properties.
spring.config.import=optional:file:${system.home:../../system-home/standard}/configs/reveila.properties

# ===============================================================
# CORE & PERFORMANCE
# ===============================================================
server.port=8080
spring.application.name=Reveila-Spring
# Project Loom support for high-concurrency API routing
spring.threads.virtual.enabled=true
spring.profiles.active=dev

# ===============================================================
# PERSISTENCE: JPA / POSTGRES
# ===============================================================
# The database URL is configured to work within the Docker Compose network by default.
# For local dev without Docker, these can be overridden in reveila.properties.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/reveila_db
spring.datasource.username=${DB_USER:admin}
spring.datasource.password=${DB_PASSWORD:6788565119}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# SQL display settings (set to false for production to minimize logs)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================================================
# JSON & SERIALIZATION
# ===============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ===============================================================
# LOGGING (INFRASTRUCTURE DEFAULTS)
# ===============================================================
# General root level (can be overridden in reveila.properties for specific business logic)
logging.level.root=INFO

# Framework logging noise reduction
logging.level.org.apache.tomcat=INFO
logging.level.org.apache.catalina=INFO
logging.level.org.apache.coyote=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO

# ===============================================================
# MONITORING & ACTUATOR (DEFAULTS)
# ===============================================================
management.endpoint.health.enabled=true
management.endpoint.info.enabled=true
management.endpoint.metrics.enabled=true
# Default to basic endpoints; overrides for security/exposures should be in reveila.properties
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Health check indicators
management.health.db.enabled=true
management.health.diskspace.enabled=true
# Point to the data directory within system home
management.health.diskspace.path=${system.home}/data
management.health.diskspace.threshold=10MB

# Info endpoint metadata
management.info.env.enabled=true
management.info.app.name=${system.name:Reveila}
management.info.app.version=${system.version:1.0.0}
management.info.app.description=Reveila Spring Boot Application

# ===============================================================
# WEB RESOURCES
# ===============================================================
spring.web.resources.cache.period=0
# Default static location (expected to be overridden in reveila.properties)
spring.web.resources.static-locations=classpath:/static/

# DevTools
spring.devtools.restart.additional-paths=${system.home}/web
