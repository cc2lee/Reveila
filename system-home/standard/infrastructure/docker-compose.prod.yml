# docker-compose.prod.yml

# This file should only contain the "Mission Critical" services:
#   1. The Reveila AI Fabric (Spring Boot app).
#   2. The PostgreSQL database.
#   3. The Reverse Proxy (if you use one).

services:
  reveila-fabric:       # 1. SERVICE NAME
    env_file:
      - .env  
    
    build:              # 2. BUILD INSTRUCTIONS
      context: .        
      dockerfile: Dockerfile 
    image: reveila-fabric:1.0.0  
    container_name: reveila-fabric-container 
    environment:
      - REVEILA_HOME=/reveila
      - WEB_ROOT=/reveila/web  
      - SPRING_CONFIG_ADDITIONAL_LOCATION=file:/reveila/configs/reveila.properties
      - SPRING_PROFILES_ACTIVE=prod
      # Reconciled Infrastructure variables
      - REVEILA_DB_HOST=reveila-db-prod
      - REVEILA_DB_USER=${DB_USER}
      - REVEILA_DB_PASSWORD=${DB_PASSWORD}
      - REVEILA_DB_NAME=${DB_NAME:-reveila_db}
    ports:
      - "8080:8080"
    volumes:
      # Map sibling folders into the container root
      - ../bin:/reveila/bin:ro
      - ../libs:/reveila/libs:ro
      - ../configs:/reveila/configs:ro
      - ../web:/reveila/web:ro
      - ../resources:/reveila/resources:ro
      - ../data:/reveila/data:rw
      - ../logs:/reveila/logs:rw
      - ../plugins:/reveila/plugins:ro
    depends_on:
      reveila-db-prod:
        condition: service_healthy

  # The Sovereign Data Node (Postgres + pgvector)
  reveila-db-prod:
    image: ankane/pgvector:latest
    container_name: reveila-db-prod
    ports:
      - "5432:5432"  # This bridges the container to the host machine for external access
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME:-reveila_db}
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-reveila_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
