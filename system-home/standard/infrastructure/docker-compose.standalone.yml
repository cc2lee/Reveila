# docker-compose.standalone.yml
# Use this for a truly portable deployment where all code is baked into the image.

services:
  reveila-fabric:
    env_file:
      - .env  # Load database credentials from the local .env file
    
    build:
      context: ../             # Go up one level to 'system-home/standard'
      dockerfile: infrastructure/Dockerfile.standalone
    
    image: reveila-fabric-standalone:1.0.0
    container_name: reveila-fabric-standalone
    
    environment:
      - REVEILA_HOME=/reveila
      - WEB_ROOT=/reveila/web
      - SPRING_CONFIG_ADDITIONAL_LOCATION=file:/reveila/configs/reveila.properties
      - SPRING_PROFILES_ACTIVE=prod
      - REVEILA_DB_HOST=reveila-db-prod
      - REVEILA_DB_USER=${DB_USER}
      - REVEILA_DB_PASSWORD=${DB_PASSWORD}
      - REVEILA_DB_NAME=${DB_NAME:-reveila_db}
      - OLLAMA_API_URL=http://ollama-service:11434
    
    ports:
      - "8080:8080"
    
    volumes:
      # Map persistent state and editable configs
      - ../data:/reveila/data:rw
      - ../logs:/reveila/logs:rw
      - ../configs:/reveila/configs:rw
    
    depends_on:
      reveila-db-prod:
        condition: service_healthy
      ollama-service:
        condition: service_started

  # The Sovereign Data Node (Shared with the prod stack)
  reveila-db-prod:
    image: ankane/pgvector:latest
    container_name: reveila-db-prod
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME:-reveila_db}
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-reveila_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Local AI Service (Ollama)
  ollama-service:
    image: ollama/ollama:latest
    container_name: ollama-service
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # Automated Model Provisioning
  model-puller:
    image: ollama/ollama:latest
    container_name: model-puller
    entrypoint: /bin/sh
    command:
      - "-c"
      - "sleep 10 && ollama pull llama3"
    depends_on:
      - ollama-service

volumes:
  ollama_data: {}
