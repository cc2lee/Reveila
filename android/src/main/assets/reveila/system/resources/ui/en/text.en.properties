# Knowledge Vault Setup
vault.setup.title=Set Up Knowledge Vault
vault.setup.intro=The Knowledge Vault is a folder on your device that you choose for Reveila to read. After you grant access, Reveila uses the files in that folder to build long-term memory and keeps its index up to date as the folder changes.
vault.setup.step1.title=Pick a folder
vault.setup.step1.desc=Select the folder you want to use as your Knowledge Vault. Reveila will only read files inside this folder (and its subfolders).
vault.setup.step2.title=Grant access
vault.setup.step2.desc=When your device asks for permission, allow Reveila to access the selected Knowledge Vault folder.
vault.setup.step3.title=Add files
vault.setup.step3.desc=Copy or move documents into the folder (PDF, Word, TXT, or Markdown). These files become the source material Reveila can reference.
vault.setup.step4.title=Organize (optional)
vault.setup.step4.desc=Create subfolders to keep documents grouped by topic. This helps you manage what you store, but Reveila can read across all subfolders.
vault.setup.step5.title=Wait for sync
vault.setup.step5.desc=Reveila updates its index automatically in the background when files are added, edited, moved, or deleted. Depending on file size and number of files, updates may take a moment.
vault.setup.step6.title=Remove information
vault.setup.step6.desc=Delete a file from the Knowledge Vault folder to remove its content from what Reveila can use.
vault.setup.note=Note: Reveila can run fully offline using the built-in AI model (your files stay on your device). For faster performance, turn on Cloud Mode in Settings to use a cloud provider.
vault.setup.button=Open Directory Picker

# Priority Keywords Setup
keywords.setup.title=Set Priority Keywords
keywords.setup.intro=Enter a few priority keywords to tell Reveila what to focus on. Reveila uses these terms to weigh information and respond in the context that matters most to you.
keywords.setup.input.prompt=Type your terms in the input box (for example: "Q2 budget", "Acme project").
keywords.setup.suggestions=Suggestions: Add keywords like budgets, project names, client names, risks, deadlines, financial details, or any terms you want Reveila to prioritize.
keywords.setup.label=Priority Keywords (comma separated)
keywords.setup.button=Start Secure Indexing

