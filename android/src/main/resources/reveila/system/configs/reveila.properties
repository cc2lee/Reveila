#
# File name: reveila.properties
# This file defines system wide properties and initialization parameters.
#

# Initialization parameters
system.name=Reveila Android Edition
system.version=1.0.0

# If true, all invocations are local.
# If false, it's assumed a cluster of Reveila instances exist,
# then the fastest node based on history will be used for invocation.
system.standalone=false

# System mode can be 'development', 'production' or 'demo'.
# In development mode, additional logging and debugging information may be available.
# In production mode, the system is optimized for performance and security.
# In demo mode, the system may use mock data and limited functionality for demonstration purposes.
system.mode=demo

# The encryption and decryption key
cryptographer.secretkey=1234567890123456

# Set system logging properties
# Valid values for <level>: OFF, SEVERE, WARNING, INFO, CONFIG, FINE, FINER, FINEST, ALL
logging.level.root=INFO
logging.level.com.reveila=DEBUG
logging.file.size=20480
logging.file.count=1
logging.console.enabled=true

# LLM Multi-Model Governance Roles
# Roles: openai, gemini
ai.governance.worker=openai
ai.governance.guardrail=gemini

# Component start timeout in seconds. Default is 60 seconds.
component.start.timeout=5
